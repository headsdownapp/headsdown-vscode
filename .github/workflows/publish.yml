name: Publish Extension

on:
  release:
    types:
      - published
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Validate publish secrets
        run: |
          missing=0
          if [ -z "${{ secrets.VSCE_PAT }}" ]; then
            echo "Missing required secret: VSCE_PAT"
            missing=1
          fi
          if [ -z "${{ secrets.OVSX_PAT }}" ]; then
            echo "Missing required secret: OVSX_PAT"
            missing=1
          fi
          if [ "$missing" -eq 1 ]; then
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Unit tests
        run: npm run test:unit

      - name: Lint
        run: npm run lint

      - name: Package VSIX
        run: npm run package

      - name: Capture VSIX filename
        id: vsix
        run: |
          VSIX_PATH=$(ls -1 *.vsix | head -n 1)
          echo "vsix_path=$VSIX_PATH" >> "$GITHUB_OUTPUT"

      - name: Upload VSIX to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.vsix.outputs.vsix_path }}

      - name: Publish to Visual Studio Marketplace
        run: npx @vscode/vsce publish --packagePath "${{ steps.vsix.outputs.vsix_path }}" -p "${{ secrets.VSCE_PAT }}"

      - name: Publish to Open VSX
        run: npx ovsx publish "${{ steps.vsix.outputs.vsix_path }}" -p "${{ secrets.OVSX_PAT }}"
